services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: titan
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - titan_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d titan"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - titan_qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/titan
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/titan
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      TOGETHERAI_API_KEY: ${TOGETHERAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      PERPLEXITYAI_API_KEY: ${PERPLEXITYAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      BAICHUAN_API_KEY: ${BAICHUAN_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_API_BASE: ${MINIMAX_API_BASE:-}
      VOLCENGINE_API_KEY: ${VOLCENGINE_API_KEY:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_API_BASE: ${AZURE_API_BASE:-}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-}
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-deepseek/deepseek-v4-pro}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      TITAN_ADMIN_API_KEY: ${TITAN_ADMIN_API_KEY:-}
      TITAN_INTEGRATIONS_FERNET_KEY: ${TITAN_INTEGRATIONS_FERNET_KEY:-}
      TITAN_API_PUBLIC_BASE_URL: ${TITAN_API_PUBLIC_BASE_URL:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID:-}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      WEIBO_APP_KEY: ${WEIBO_APP_KEY:-}
      WEIBO_APP_SECRET: ${WEIBO_APP_SECRET:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["celery"]
    command: ["-A", "app.workers.celery_app", "worker", "-l", "INFO"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/titan
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/titan
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      TOGETHERAI_API_KEY: ${TOGETHERAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      PERPLEXITYAI_API_KEY: ${PERPLEXITYAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      BAICHUAN_API_KEY: ${BAICHUAN_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_API_BASE: ${MINIMAX_API_BASE:-}
      VOLCENGINE_API_KEY: ${VOLCENGINE_API_KEY:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_API_BASE: ${AZURE_API_BASE:-}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-}
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-deepseek/deepseek-v4-pro}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      TITAN_ADMIN_API_KEY: ${TITAN_ADMIN_API_KEY:-}
      TITAN_INTEGRATIONS_FERNET_KEY: ${TITAN_INTEGRATIONS_FERNET_KEY:-}
      TITAN_API_PUBLIC_BASE_URL: ${TITAN_API_PUBLIC_BASE_URL:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID:-}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      WEIBO_APP_KEY: ${WEIBO_APP_KEY:-}
      WEIBO_APP_SECRET: ${WEIBO_APP_SECRET:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/titan
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production-32chars}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://tokenply.world}
      # Canonical site URL for OAuth (match the host in the browser: www vs apex).
      AUTH_URL: ${AUTH_URL:-https://tokenply.world}
      AUTH_TRUST_HOST: "true"
      BACKEND_INTERNAL_URL: http://backend:8000
      TITAN_ADMIN_EMAILS: ${TITAN_ADMIN_EMAILS:-}
      TITAN_ADMIN_API_KEY: ${TITAN_ADMIN_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      - backend

volumes:
  titan_pg_data:
  titan_qdrant_data:
